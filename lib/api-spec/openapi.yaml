openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: parse-treat
    description: Parse treat and location from text
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /parse-treat:
    post:
      operationId: parseTreat
      tags: [parse-treat]
      summary: Parse treat and location from text
      description: Extracts the treat name and its location from a given text using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseTreatRequest"
      responses:
        "200":
          description: Parsed treat and location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseTreatResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ParseTreatRequest:
      type: object
      properties:
        text:
          type: string
      required:
        - text
    ParseTreatResponse:
      type: object
      properties:
        treat:
          type: string
        location:
          type: string
      required:
        - treat
        - location

