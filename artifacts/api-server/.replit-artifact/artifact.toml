kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "uvicorn main:app --host 0.0.0.0 --port $PORT --reload --app-dir /home/runner/workspace/artifacts/api-server"

[services.production]

[services.production.build]
args = []

[services.production.run]
args = ["bash", "-c", "uvicorn main:app --host 0.0.0.0 --port $PORT --app-dir /home/runner/workspace/artifacts/api-server"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
